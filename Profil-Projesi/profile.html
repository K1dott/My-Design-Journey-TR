<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card UI</title>

    <!-- CSS -->
    <link rel="stylesheet" href="prof.css">

    <!-- Boxicons CSS -->
     <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="profile-card">
        <div class="image">
            <img src="images.webp" class="profile-img">
        </div>

        <div class="text-data">
            <span class="name">Umut</span>
            <span class="job">Öğrenci & TR No.1 Yasuo</span>
        </div>

        <div class="media-buttons">
            <a href="#" class="link" style="background-color: #4267b2;">
                <i class='bx bxl-facebook'></i>
            </a>
            <a href="#" class="link" style="background-color: #1da1f2;">
                <i class='bx bxl-twitter' ></i>
            </a>
            <a href="#" class="link" style="background-color: #e1306c;">
                <i class='bx bxl-instagram' ></i>
            </a>
            <a href="#" class="link" style="background-color: #ff0000;">
                <i class='bx bxl-youtube' ></i>
            </a>
        </div>

        <div class="buttons">
            <button class="button">Abone Ol</button>
            <button class="button">Mesaj Gönder</button>
        </div>

        <div class="analytics">
            <div class="data">
                <i class='bx bx-heart' ></i>
                <span class="number">120k</span>
            </div>
            <div class="data">
                <i class='bx bx-message-rounded' ></i>
                <span class="number">89k</span>
            </div>
            <div class="data">
                <i class='bx bx-share' ></i>
                <span class="number">56k</span>
            </div>
        </div>
    </div>
</body>
</html>
